<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>HSRチャット（日本語版）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
    <div class="chat-row"></div>

    <header>
        <h2>HSRチャット</h2>
        <h3>英語・中国語非対応</h3>

        <div class="header-dot-right"></div>
    </header>

    <main id="chatBox"></main>

    <footer>
        <div class="input-area">
            <input id="messageInput" placeholder="メッセージを入力">
            <button id="sendBtn">送信</button>
        </div>

        <div class="option-bar">
            <select id="characterSelect"></select>
            <button class="option-btn">＋オプション</button>
        </div>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
